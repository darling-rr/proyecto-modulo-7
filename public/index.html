<!DOCTYPE html>
<html lang="es">
<head>

  <style>

      font-family: Arial, sans-serif;

    .card {
      max-width: 700px;
      margin: 0 auto;

    }

    code {
      background: #eef3ff;
      padding: 4px 8px;

      text-decoration: none;
      font-weight: bold;
    }

  <div class="card">
    <h1>Proyecto Backend con Node y Express</h1>
    <p>Servidor funcionando correctamente.</p>
    <p>Ruta HTML: <code>/</code></p>

</html>
